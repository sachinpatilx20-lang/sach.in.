<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sach.in | Time Slot Manager</title>
    <meta name="description" content="Manage your time slots and tasks with automatic duration calculations and clean JPG export.">

    <!-- Fonts: Sora (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons (UMD) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Toast notification — replaces native alert() -->
    <div id="notification" class="toast" role="alert" aria-live="polite" aria-atomic="true"></div>

    <!-- Background decoration -->
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <div class="app-wrap">

        <!-- ────────────── HEADER ────────────── -->
        <header class="site-header">
            <div class="brand">
                <h1 class="logo">Sach<span>.in</span></h1>
                <p class="brand-tag">
                    <i data-lucide="zap" aria-hidden="true"></i>
                    Time Management Authority
                </p>
            </div>
            <div class="header-date-pill" id="header-date-pill" aria-live="polite"></div>
        </header>

        <main>

            <!-- ────────────── DATE CARD ────────────── -->
            <section class="card" aria-labelledby="lbl-date">
                <div class="card-hd">
                    <span class="card-ico"><i data-lucide="calendar-days" aria-hidden="true"></i></span>
                    <h2 id="lbl-date">Session</h2>
                </div>
                <div class="two-col">
                    <div class="field">
                        <label for="schedule-date">Date</label>
                        <input type="date" id="schedule-date" autocomplete="off">
                    </div>
                    <div class="field">
                        <label>Day of Week</label>
                        <output id="day-display" class="day-display" for="schedule-date">—</output>
                    </div>
                </div>
            </section>

            <!-- ────────────── ADD SLOT CARD ────────────── -->
            <section class="card" aria-labelledby="lbl-add">
                <div class="card-hd">
                    <span class="card-ico"><i data-lucide="plus-circle" aria-hidden="true"></i></span>
                    <h2 id="lbl-add">Add Time Slot</h2>
                </div>
                <form id="task-form" novalidate autocomplete="off">
                    <div class="form-grid">
                        <div class="field">
                            <label for="start-time">Start</label>
                            <div class="input-ico-wrap">
                                <i data-lucide="play-circle" aria-hidden="true"></i>
                                <input type="time" id="start-time" required>
                            </div>
                        </div>
                        <div class="field">
                            <label for="end-time">End</label>
                            <div class="input-ico-wrap">
                                <i data-lucide="stop-circle" aria-hidden="true"></i>
                                <input type="time" id="end-time" required>
                            </div>
                        </div>
                        <div class="field span-2">
                            <label for="activity">Activity / Task</label>
                            <div class="input-ico-wrap">
                                <i data-lucide="pencil-line" aria-hidden="true"></i>
                                <input
                                    type="text"
                                    id="activity"
                                    placeholder="e.g. Deep Work, Team Standup, Lunch…"
                                    required
                                    maxlength="120"
                                >
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-add">
                        <i data-lucide="plus" aria-hidden="true"></i>
                        <span>Add Activity</span>
                    </button>
                </form>
            </section>

            <!-- ────────────── SCHEDULE CARD ────────────── -->
            <section class="card schedule-card" aria-labelledby="lbl-schedule">
                <div class="card-hd schedule-hd">
                    <div class="hd-left">
                        <span class="card-ico"><i data-lucide="layout-list" aria-hidden="true"></i></span>
                        <h2 id="lbl-schedule">Daily Schedule</h2>
                    </div>
                    <button id="export-btn" class="btn-export" disabled aria-label="Export schedule as JPG">
                        <i data-lucide="download" aria-hidden="true"></i>
                        <span>Export JPG</span>
                    </button>
                </div>

                <!-- Empty state -->
                <div id="empty-state" class="empty-state" role="status">
                    <div class="empty-ico"><i data-lucide="hourglass" aria-hidden="true"></i></div>
                    <p class="empty-title">No activities yet</p>
                    <p class="empty-sub">Add a time slot above to start tracking your day.</p>
                </div>

                <!-- Table wrapper (hidden when empty) -->
                <div id="table-wrap" class="table-wrap" hidden>
                    <table id="task-table" aria-label="Daily schedule tasks">
                        <thead>
                            <tr>
                                <th scope="col">Start</th>
                                <th scope="col">End</th>
                                <th scope="col">Duration</th>
                                <th scope="col">Activity</th>
                                <th scope="col" class="col-action"><span class="sr-only">Remove</span></th>
                            </tr>
                        </thead>
                        <tbody id="task-list"></tbody>
                        <tfoot>
                            <tr class="total-row">
                                <td colspan="2" class="total-lbl">
                                    <i data-lucide="sigma" aria-hidden="true"></i> Total
                                </td>
                                <td id="total-duration" class="total-val" aria-live="polite">0h 0m</td>
                                <td colspan="2"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <!-- Quick stats bar -->
                <div id="stats-bar" class="stats-bar" hidden aria-live="polite"></div>

            </section>
        </main>

        <!-- ────────────── FOOTER ────────────── -->
        <footer class="site-footer">
            <a
                href="https://www.instagram.com/sachinpatil12n/"
                target="_blank"
                rel="noopener noreferrer"
                class="ig-link"
                aria-label="Sach.in on Instagram"
            >
                <i data-lucide="instagram" aria-hidden="true"></i>
                <span>@sachinpatil12n</span>
            </a>
            <p class="copy">&copy; 2026 Sach.in — Crafted with efficiency in mind.</p>
        </footer>

    </div>

    <script src="app.js"></script>
</body>
</html>
